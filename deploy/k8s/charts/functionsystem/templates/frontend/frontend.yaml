apiVersion: apps/v1
kind: Deployment
metadata:
  name: faas-frontend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.global.replicas.faasFrontend }}
  selector:
    matchLabels:
      app: faas-frontend
  template:
    metadata:
      labels:
        app: faas-frontend
    spec:
      volumes:
        - name: iam-policy-config-volume
          configMap:
            name: iam-policy-config
            items:
              - key: iam-policy-config.json
                path: iam-policy-config.json
            defaultMode: 416
        - name: volume-config
          configMap:
            name: frontend-config
            items:
              - key: config.json
                path: config.json
            defaultMode: 420
        - name: log-volume
          hostPath:
            path: "{{ .Values.global.log.hostPath.componentLog }}"
            type: DirectoryOrCreate
        - name: vol-home-uds
          hostPath:
            path: /home/uds
            type: ""
        - name: data-volume
          emptyDir:
            sizeLimit: 5Gi
      initContainers:
        - name: agent-init-container
          image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.agentInit }}
          command: ["/bin/sh", "-c", "chown 1002:1002 /opt/yuanrong/logs && chmod 777 /opt/yuanrong/logs"]
          resources:
            limits:
              cpu: {{ .Values.global.resources.functionAgentInit.limits.cpu }}
              memory: {{ .Values.global.resources.functionAgentInit.limits.memory }}
            requests:
              cpu: {{ .Values.global.resources.functionAgentInit.requests.cpu }}
              memory: {{ .Values.global.resources.functionAgentInit.requests.memory }}
          volumeMounts:
            - name: log-volume
              mountPath: /opt/yuanrong/logs
              subPathExpr: $(RUNTIME_POD_NAME)
          env:
            - name: RUNTIME_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - CHOWN
                - NET_RAW
                - NET_ADMIN
                - SYS_ADMIN
                - CHOWN
                - SETGID
                - SETUID
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
              drop:
                - ALL
            runAsUser: 0
      containers:
        - name: service-container
          image: {{ .Values.global.imageRegistry }}{{ .Values.global.images.common }}
          command: ["/bin/sh", "-l", "/home/sn/frontend/bin/bootstrap"]
          ports:
            - containerPort: {{ .Values.global.port.fassFrontendPort }}
              protocol: TCP
          env:
            - name: RUNTIME_HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: RUNTIME_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: RUNTIME_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: RUNTIME_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: RUNTIME_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: RUNTIME_POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: X_WISECLOUD_SITE
              value: aaa.bbb
            - name: X_WISECLOUD_TENANT_ID
              value: aaa.bbb
            - name: X_WISECLOUD_APPLICATION_ID
              value: aaa.bbb
            - name: X_WISECLOUD_SERVICE_ID
              value: aaa.bbb
            - name: X_WISECLOUD_ENVIRONMENT_ID
              value: a506e551a0834d1daccd7d93cb202ae4
            - name: RUNTIME_MICROSERVICE_NAME
              value: aaa.bbb
            - name: RUNTIME_MICROSERVICE_CLUSTER
              value: cn-dev-scheduler-green
            - name: LANG
              value: en_US.UTF-8
            - name: RUNTIME_MICROSERVICE_ENVIRONMENT
              value: aaa.bbb
            - name: RUNTIME_MICROSERVICE_SERVICE_NAME
              value: aaa.bbb
            - name: RUNTIME_MICROSERVICE_BUSINESS
              value: aaa.bbb
            - name: RUNTIME_MICROSERVICE_REGION
              value: cn-north-4
            - name: RUNTIME_MICROSERVICE_AZ
              value: cn-north-4g
            - name: X_WISECLOUD_CLOUDMAP_ID
              value: aaa.bbb
            - name: NUWA_CLOUDMAP_NAMESPACENAME
              value: aaa.bbb
            - name: NUWA_CLOUDMAP_SERVERADDR
              value: http://
            - name: NUWA_CLOUDMAP_DUAL_SERVERADDR
              value: http://
            - name: TZ
              value: Asia/Shanghai
            - name: WISECLOUD_ACMS_ENDPOINT
              value: ""
            - name: CURRENT_VERSION
              value: green
            - name: YR_LOG_LEVEL
              value: DEBUG
            - name: RUNTIME_MGR_PORT
              value: "{{ .Values.global.port.runtimeMgrPort }}"
            - name: RUNTIME_INIT_PORT
              value: "{{ .Values.global.port.runtimeInitPort }}"
            - name: RUNTIME_PORT_NUM
              value: "{{ .Values.global.port.runtimePortNum }}"
            - name: FUNCTION_AGENT_PORT
              value: "{{ .Values.global.port.functionAgentPort }}"
            - name: METRICS_COLLECTOR_TYPE
              value: {{ .Values.global.runtime.metricsCollectorType }}
            - name: DISK_USAGE_MONITOR_PATH
              value: {{ quote .Values.global.runtime.diskUsageMonitor.path }}
            - name: DISK_USAGE_LIMIT
              value: "{{ .Values.global.runtime.diskUsageMonitor.limit }}"
            - name: DISK_USAGE_MONITOR_DURATION
              value: "{{ .Values.global.runtime.diskUsageMonitor.duration }}"
            - name: CPU4COMP
              value: "5000"
            - name: MEM4COMP
              value: "10240"
            - name: INIT_LABELS
              value: '{"resource.owner":"30450000-0000-4000-8069-949f37caf04c"}'
            - name: RUNTIME_LOG_DIR
              value: /opt/yuanrong/logs
            - name: RUNTIME_LOG_LEVEL
              value: INFO
            - name: IS_NEW_RUNTIME_PATH
              value: "true"
            - name: JAVA_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.java8 }}"
            - name: JAVA11_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.java11 }}"
            - name: PYTHON36_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.python36 }}"
            - name: PYTHON38_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.python38 }}"
            - name: PYTHON39_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.python39 }}"
            - name: CPP_PRESTART_COUNT
              value: "{{ .Values.global.runtime.prestartCount.cpp }}"
            - name: JVM_CUSTOM_ARGS
              value: "{{ .Values.global.runtime.jvmCustomArgs }}"
            - name: RUNTIME_GID
              value: "1002"
            - name: RUNTIME_UID
              value: "1002"
            - name: INIT_HANDLER
              value: faasfrontend.InitHandler
            - name: CALL_HANDLER
              value: faasfrontend.CallHandler
            - name: CHECKPOINT_HANDLER
              value: faasfrontend.CheckpointHandler
            - name: SHUTDOWN_HANDLER
              value: faasfrontend.ShutdownHandler
            - name: SIGNAL_HANDLER
              value: faasfrontend.SignalHandler
            - name: YR_FUNCTION_LIB_PATH
              value: /home/sn/frontend/bin
            - name: INIT_ARGS_FILE_PATH
              value: /home/sn/config/config.json
            - name: GLOG_log_dir
              value: /opt/yuanrong/logs
            - name: LOG_PATTERN
              value: |-
                {
                    "separator": " | ",
                    "placeholders": [
                      {"flags": "%Y-%m-%d %H:%M:%S.%e"},
                      {"flags": "%l"},
                      {"flags": "%s:%#"},
                      {"env": "POD_NAME"},
                      {"env": "CLUSTER_ID"},
                      {"flags": ""}
                    ]
                }
            - name: IS_PROTOMSG_TO_RUNTIME
              value: "{{ .Values.global.runtime.isProtoMsgToRuntime }}"
            - name: MAX_PRIORITY
              value: "{{ .Values.global.common.prioritySchedule.maxPriority }}"
            - name: CLUSTER_NAME
              value: "cn-dev"
            - name: FUNCTION_PROXY_PORT
              value: "{{ .Values.global.port.functionProxyPort }}"
            - name: FUNCTION_PROXY_GRPC_PORT
              value: "{{ .Values.global.port.functionProxyGrpcPort }}"
            - name: META_STORE_ADDRESS
              {{- if .Values.global.metaStore.enable }}
              value: "{{ .Values.global.metaStore.address }}"
              {{- else }}
              value: "{{ .Values.global.etcdManagement.detcd }}"
              {{- end }}
            - name: IAM_META_STORE_ADDRESS
              {{- if .Values.global.metaStore.enable }}
              value: "{{ .Values.global.metaStore.address }}"
              {{- else }}
              value: "{{ .Values.global.etcdManagement.metcd }}"
              {{- end }}
            - name: SslTargetName
              value: "aaa.bbb"
            - name: DS_WORKER_PORT
              value: "{{ .Values.global.port.worker }}"
            - name: ENABLE_TRACE
              value: "{{ .Values.global.observer.enableTrace }}"
            - name: LOG_PATH
              value: "/opt/yuanrong/logs"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LOG_ROLLING_MAXSIZE
              value: "1000"
            - name: LOG_ROLLING_MAXFILES
              value: "3"
            - name: LOG_ASYNC_LOGBUFSECS
              value: "30"
            - name: LOG_ASYNC_MAXQUEUESIZE
              value: "51200"
            - name: LOG_ASYNC_THREADCOUNT
              value: "1"
            - name: LOG_ALSOLOGTOSTDERR
              value: "false"
            - name: ENABLE_METRICS
              value: "{{ .Values.global.observer.metrics.enable }}"
            - name: STS_CONFIG
              value: "{}"
            - name: METRICS_CONFIG_FILE
              value: '{{ quote .Values.global.observer.metrics.metricsConfigFile }}'
            - name: MEM_THRESHOLD_PERCENTAGE
              value: "90"
            - name: ResourcePath
              value: "/home/wisfunction/resource"
            - name: RUNTIME_HEARTBEAT_ENABLE
              value: "true"
            - name: RUNTIME_MAX_HEARTBEAT_TIMEOUT_TIMES
              value: "{{ .Values.global.runtime.runtimeMaxHeartbeatTimeoutTimes }}"
            - name: MAX_STORAGE_OPERATE_RETRY_TIMES
              value: "60"
            - name: RUNTIME_HEARTBEAT_TIMEOUT_MS
              value: "{{ .Values.global.runtime.runtimeHeartbeatTimeoutMS }}"
            - name: RUNTIME_RECOVER_ENABLE
              value: "false"
            - name: DRIVER_ENABLE
              value: "{{ .Values.global.common.driverEnable }}"
            - name: STATE_STORAGE_TYPE
              value: "{{ .Values.global.common.stateStorageType }}"
            - name: ELECTION_MODE
              value: "{{ .Values.global.common.electionMode }}"
            - name: MAX_GRPC_SIZE
              value: "{{ .Values.global.common.maxGrpcSize }}"
            - name: DS_HEALTH_CHECK_INTERVAL
              value: "1000"
            - name: MAX_DS_HEALTH_CHECK_TIMES
              value: "12"
            - name: DS_HEALTH_CHECK_PATH
              value: "/home/sn/datasystem/health"
            - name: SERVICES_PATH
              value: "/home/sn/service-config/services.yaml"
            - name: SYSTEM_TIMEOUT
              value: "{{ .Values.global.common.systemTimeout }}"
            - name: SERVICE_TTL
              value: "60000"
            - name: RUNTIME_SHUTDOWN_TIMEOUT_SECONDS
              value: "{{ .Values.global.runtime.runtimeShutdownTimeoutSeconds }}"
            - name: CACHE_STORAGE_AUTH_ENABLE
              value: "{{ .Values.global.dataSystem.authEnabled }}"
            - name: SSL_ENABLE
              value: "{{ .Values.global.mutualSSLConfig.sslEnable }}"
            - name: DECRYPT_ALGORITHM
              value: "{{ .Values.global.common.decryptAlgorithm }}"
            - name: MIN_INSTANCE_CPU_SIZE
              value: "{{ .Values.global.runtime.minInstanceCpuSize }}"
            - name: MIN_INSTANCE_MEMORY_SIZE
              value: "{{ .Values.global.runtime.minInstanceMemorySize }}"
            - name: MAX_INSTANCE_CPU_SIZE
              value: "{{ .Values.global.runtime.maxInstanceCpuSize }}"
            - name: MAX_INSTANCE_MEMORY_SIZE
              value: "{{ .Values.global.runtime.maxInstanceMemorySize }}"
            - name: ENABLE_SERVER_MODE
              value: "{{ .Values.global.runtime.serverModeEnable }}"
            - name: LOG_COMPRESS_ENABLE
              value: "true"
            - name: ENABLE_PRINT_RESOURCE_VIEW
              value: "{{ .Values.global.common.enablePrintResourceView }}"
            - name: PROMETHEUS_PUSH_GATEWAY_IP
              value: "{{ .Values.global.observer.proGatewayIP }}"
            - name: PROMETHEUS_PUSH_GATEWAY_PORT
              value: "{{ .Values.global.observer.gatewayPort }}"
            - name: CLUSTER_ID
              value: {{ quote .Values.global.clusterId }}
            - name: INVOKE_LIMITATION_ENABLE
              value: "{{ .Values.global.rateLimit.invokeRateLimit.enable }}"
            - name: LOW_MEMORY_THRESHOLD
              value: "{{ .Values.global.rateLimit.invokeRateLimit.lowThreshold }}"
            - name: HIGH_MEMORY_THRESHOLD
              value: "{{ .Values.global.rateLimit.invokeRateLimit.highThreshold }}"
            - name: MESSAGE_SIZE_THRESHOLD
              value: "{{ .Values.global.rateLimit.invokeRateLimit.msgSize }}"
            - name: RUNTIME_DS_AUTH_ENABLE
              value: "{{ .Values.global.runtime.dataSystem.authEnable }}"
            - name: RUNTIME_DS_ENCRYPT_ENABLE
              value: {{ quote .Values.global.runtime.dataSystem.encryptEnable }}
            - name: RUNTIME_DS_CLIENT_PUBLICKEY
              value: ""
            - name: RUNTIME_DS_CLIENT_PRIVATEKEY
              value: ""
            - name: RUNTIME_DS_SERVER_PUBLICKEY
              value: ""
            - name: ETCD_AUTH_TYPE
              value: "{{ .Values.global.etcdManagement.authType }}"
            - name: SCC_ENABLE
              value: "{{ .Values.global.scc.enable }}"
            - name: IAM_POLICY_CONFIG_PATH
              value: "/home/sn/iam-config/iam-policy-config.json"
            - name: K8S_BASE_URL
              value: "{{ .Values.global.kubernetes.kubeApiBaseUrl }}"
            - name: K8S_NAMESPACE
              value: "default"
            - name: MAX_TOLERATE_META_STORE_FAILED_TIMES
              value: "{{ .Values.global.etcdManagement.maxTolerateMetaStoreFailedTimes }}"
            - name: META_HEALTH_CHECK_INTERVAL_MS
              value: "{{ .Values.global.etcdManagement.metaStoreCheckHealthIntervalMs }}"
            - name: META_HEALTH_CHECK_TIMEOUTS
              value: "{{ .Values.global.etcdManagement.metaStoreTimeoutMs }}"
            - name: ENABLE_IAM
              value: "{{ .Values.global.iam.enable }}"
            - name: IAM_CREDENTIAL_TYPE
              value: "{{ .Values.global.iam.credentialType }}"
            - name: IAM_BASE_PATH
              value: "http://iam-adaptor.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.global.port.iamAdapterHttpPort }}"
            - name: SYSTEM_AUTH_MODE
              value: "{{ .Values.global.common.systemAuthMode }}"
            - name: ETCD_TARGET_NAME_OVERRIDE
              value: "aaa.bbb"
            - name: CACHE_STORAGE_AUTH_TYPE
              value: ""
            - name: FUNCTION_META_PATH
              value: "/home/sn/function-metas"
            - name: RESOURCE_PATH
              value: "/home/sn/resource"
            - name: LIB_PATH
              value: "{{ .Values.global.runtime.libPath }}"
          resources:
            limits:
              cpu: {{ .Values.global.resources.faasFrontend.limits.cpu }}
              memory: {{ .Values.global.resources.faasFrontend.limits.memory }}
            requests:
              cpu: {{ .Values.global.resources.faasFrontend.requests.cpu }}
              memory: {{ .Values.global.resources.faasFrontend.requests.memory }}
          volumeMounts:
            - name: volume-config
              mountPath: /home/sn/config
            - name: vol-home-uds
              mountPath: /home/uds
            - name: log-volume
              mountPath: /opt/yuanrong/logs
              subPathExpr: $(RUNTIME_POD_NAME)
            - name: data-volume
              mountPath: /opt/yuanrong/data
            - name: iam-policy-config-volume
              mountPath: /home/sn/iam-config
          livenessProbe:
            tcpSocket:
              port: {{ .Values.global.port.fassFrontendPort }}
            initialDelaySeconds: 6
            timeoutSeconds: 5
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.global.port.fassFrontendPort }}
            initialDelaySeconds: 6
            timeoutSeconds: 5
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - kill -15 $(ps aux | grep -i function_proxy | awk '{print $2}') 2>/dev/null
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1002
            runAsNonRoot: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 300
      dnsPolicy: ClusterFirst
      securityContext:
        fsGroup: {{ .Values.global.runtime.fsGroup }}
      imagePullSecrets:
        - name: default-secret
  revisionHistoryLimit: 5