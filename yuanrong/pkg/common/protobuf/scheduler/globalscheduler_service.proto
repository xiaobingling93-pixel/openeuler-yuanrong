syntax = "proto3";

package scheduler;

option go_package = "grpc/pb/scheduler;scheduler";

service GlobalSchedulerService {
  // local scheduler register to global scheduler.
  rpc RegisterLocalScheduler (RegisterLocalSchedulerRequest) returns (RegisterLocalSchedulerResponse);
  // domain scheduler register to global scheduler.
  rpc RegisterDomainScheduler (RegisterDomainSchedulerRequest) returns (RegisterDomainSchedulerResponse);
}

message RegisterLocalSchedulerRequest {
  string hostname = 1;
  string address = 2;
}

message RegisterLocalSchedulerResponse {
  string leaderAddress = 2;
}

message RegisterDomainSchedulerRequest {
  string name = 1;
}

message RegisterDomainSchedulerResponse {
  message member {
    string name = 1;
    string address = 2;
  }
  string leaderAddress = 1;
  repeated member members = 2;
}