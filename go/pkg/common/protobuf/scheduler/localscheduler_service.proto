syntax = "proto3";

package scheduler;

import "scheduler_common.proto";

option go_package = "grpc/pb/scheduler;scheduler";

service LocalSchedulerService {
    // domain scheduler forwards scheduler request to local scheduler
    rpc ForwardSchedule (scheduler.ForwardScheduleRequest) returns (scheduler.ForwardScheduleResponse);
    // PullMetrics
    rpc PullMetrics (scheduler.PullMetricsRequest) returns (scheduler.PullMetricsResponse);
    // NotifyLocalScheduler notify leader address to local scheduler
    rpc NotifyLocalScheduler (NotifyLocalSchedulerRequest) returns (NotifyLocalSchedulerResponse);
    // RegisterWorker register worker to local scheduler
    rpc RegisterWorker (scheduler.RegisterWorkerRequest) returns (scheduler.RegisterWorkerResponse);
    // UnregisterWorker unregister worker from local scheduler
    rpc UnregisterWorker (scheduler.UnregisterWorkerRequest) returns (scheduler.UnregisterWorkerResponse);
}

message NotifyLocalSchedulerRequest {
    string Address = 1;
}

message NotifyLocalSchedulerResponse {
}
