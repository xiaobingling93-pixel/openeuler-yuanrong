syntax = "proto3";

package specialize;

option java_multiple_files = true;
option java_package = "com.sn.runtime.rpc.generate";
option go_package = "./;pb";

service Specialize {
    rpc InitRuntime (InitRequest) returns (InitResponse) {}
}

message InitRequest {
    string logicInstanceID = 1;
    string customHandler = 2;
    map<string, string> envs = 3;
    repeated string storageInfo = 4;
    string busAddress = 5;
    map<string, string> hookHandler = 6;
}

message InitResponse {
    int32 code = 1;
    string message = 2;
}