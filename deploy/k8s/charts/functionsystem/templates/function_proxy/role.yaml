apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: function-proxy-{{ .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - create
      - update