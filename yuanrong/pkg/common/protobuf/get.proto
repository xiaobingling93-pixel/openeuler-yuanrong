syntax = "proto3";

package getfuture;

option go_package = "api/getfuture";

option java_package = "com.sn.msgstruct";
option java_outer_classname = "Get";

message RequestPb {
    string futureID = 1;
    string stateID = 2;
    string state = 3;
}

message ResponsePb {
    int32 code = 1;
    string message = 2;
    string result = 3;
    string state = 4;
    bool updateState = 5;
}

message TaskRequestPb {
    string futureID = 1;
    string stateID = 2;
}

message TaskResponsePb {
    int32 code = 1;
    string message = 2;
    string result = 3;
    string log = 4;
}
