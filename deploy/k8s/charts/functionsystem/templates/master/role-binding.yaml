kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: function-master
  namespace: {{ .Values.global.namespace }}
subjects:
- kind: ServiceAccount
  name: function-master
  namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: function-master
  apiGroup: rbac.authorization.k8s.io