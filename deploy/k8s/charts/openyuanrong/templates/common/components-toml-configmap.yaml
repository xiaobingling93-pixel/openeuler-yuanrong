    # previous ENV in chart
    RUNTIME_MICROSERVICE_NAME="aaa.bbb"
    RUNTIME_MICROSERVICE_CLUSTER="cn-dev-master"
    LANG="en_US.UTF-8"
    RUNTIME_MICROSERVICE_ENVIRONMENT="aaa.bbb"
    RUNTIME_MICROSERVICE_SERVICE_NAME="aaa.bbb"
    RUNTIME_MICROSERVICE_BUSINESS="aaa.bbb"
