syntax = "proto3";

package scheduler;

import "scheduler_common.proto";

option go_package = "grpc/pb/scheduler;scheduler";

service DomainSchedulerService {
    // domain scheduler forwards scheduler request to local scheduler
    rpc ForwardSchedule (scheduler.ForwardScheduleRequest) returns (scheduler.ForwardScheduleResponse);
    // PullMetrics
    rpc PullMetrics (scheduler.PullMetricsRequest) returns (scheduler.PullMetricsResponse);
    // QuerySchedulersMetrics
    rpc QuerySchedulersMetrics (QuerySchedulersMetricsRequest) returns (QuerySchedulersMetricsResponse);
    // NotifySchedulerLineage
    rpc NotifySchedulerLineage (NotifySchedulerLineageRequest) returns (NotifySchedulerLineageResponse);
    // GetNodesResource
    rpc GetNodesResource (GetNodesResourceRequest) returns (GetNodesResourceResponse);
    // ReBalance
    rpc ReBalance (ReBalanceRequest) returns (ReBalanceResponse);
}

message QuerySchedulersMetricsRequest {
}

message QuerySchedulersMetricsResponse {
    scheduler.SchedulerMetrics self                             = 1;
    map<string, scheduler.SchedulerMetrics> subdomainSchedulers = 2;
}


message GetNodesResourceRequest {
}

message GetNodesResourceResponse {
}

message NotifySchedulerLineageRequest {
    enum type {
        ADD = 0;
        DELETE = 1;
        UPDATE = 2;
        UPDATE_MEMBER = 3;
    }
    type operationType = 1;
    string Address = 2;
    string Name = 3;
}

message NotifySchedulerLineageResponse {
}

message ReBalanceRequest {
    string dstNode = 1;
    map<string, float> resource = 2;
    string requestID = 3;
}

message ReBalanceResponse {
}

