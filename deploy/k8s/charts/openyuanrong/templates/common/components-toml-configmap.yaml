    runtime_recover_enable="false"
    decrypt_algorithm={{ quote .Values.global.common.decryptAlgorithm }}
    election_mode={{ quote .Values.global.common.electionMode }}
    k8s_namespace="default"
    system_timeout={{ quote .Values.global.common.systemTimeout }}
    ssl_enable={{ quote .Values.global.mutualSSLConfig.sslEnable }}
