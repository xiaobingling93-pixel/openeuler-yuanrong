    STS_ENABLE="false"
    MAX_STORAGE_OPERATE_RETRY_TIMES="60"
    DS_HEALTH_CHECK_PATH="/home/sn/datasystem/health"
    DS_HEALTH_CHECK_INTERVAL="1000"
