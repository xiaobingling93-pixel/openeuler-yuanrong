syntax = "proto3";

package deadlock;

option go_package = "api/deadlock";

option java_package = "com.sn.msgstruct";
option java_outer_classname = "Deadlock";

message ReqIDListPb {
    repeated string reqIDs = 1;
}

message StartRequestPb {
    string stateID = 1;
    string state = 2;
    repeated ReqIDListPb futureReqIDLists = 3;
    string tenantID = 4;
    string serviceID = 5;
}

message StartResponsePb {
    int32 code = 1;
    string message = 2;
    string deadlockID = 3;
}

message EndRequestPb {
    string stateID = 1;
    string deadlockID = 2;
    string tenantID = 4;
    string serviceID = 5;
}

message EndResponsePb {
    int32 code = 1;
    string message = 2;
    string state = 3;
}
